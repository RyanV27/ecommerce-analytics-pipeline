name: CI

on:
  push:
    branches: ["**"]
  pull_request:
    branches: [main]

jobs:
  lint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install ruff
        run: pip install "ruff>=0.4.0"

      - name: Lint code
        run: ruff check .

      - name: Check no secrets are tracked
        # Fails the build if .env or any GCP credential JSON is committed
        run: |
          tracked=$(git ls-files .env "airflow/config/*.json" 2>/dev/null || true)
          if [ -n "$tracked" ]; then
            echo "ERROR: secrets are tracked in git: $tracked"
            exit 1
          fi
          echo "OK: no secrets tracked"

  dag-syntax:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: AST-check all DAG files
        # Uses Python's ast.parse for fast syntax validation without installing Airflow.
        # This catches SyntaxErrors and obvious import-time NameErrors in under 5 seconds.
        # For full DAG load testing (which catches missing provider imports), run
        # `airflow dags list` locally after `docker compose up`.
        run: |
          python - <<'PY'
          import ast
          from pathlib import Path
      
          for f in Path('airflow/dags').glob('*.py'):
              with open(f) as fp:
                  ast.parse(fp.read())
              print('OK:', f)
          PY

  docker-build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Build Airflow image
        # Validates the custom Dockerfile (the only non-stock image in the stack).
        # Full `docker compose build` is skipped because docker-compose.yml mounts
        # Windows APPDATA paths that don't exist on the CI runner.
        run: docker build -f airflow/Dockerfile airflow/
